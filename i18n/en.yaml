pi.bio1: |-
  Milot Mirdita is an Assistant Professor at the Department of Precision Medicine <a href="https://www.skkumed.ac.kr">SKKU School of Medicine</a>. His research focuses on scalable,
  open bioinformatics infrastructure for metagenomic analysis, high-throughput homology search,
  clustering, taxonomy, and structure prediction.
pi.bio2: |-
  He previously worked with <a href="https://steineggerlab.com">Prof. Dr. Martin Steinegger</a> (SNU) and <a href="https://www.mpinat.mpg.de/soeding">Dr. Johannes Söding</a> (MPI-NAT) to create widely
  used methods for sequence alignment and annotation. Milot trained at the University of Göttingen and Max-Planck Institute
  for Multidisciplinary Sciences (Dr. rer. nat.), LMU Munich (M.Sc. Computer Science), and LMU/TUM
  (B.Sc. Bioinformatics).
team.heading: Team
team.copy: |-
