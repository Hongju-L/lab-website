pi.bio1: |-
  Milot Mirdita 교수는 <a href="https://www.skkumed.ac.kr">성균관대학교 의과대학</a> 정밀의학과 조교수입니다. 현재 그의 연구실에서는 Metagenome 분석, 상동 구조의 고속 탐색, 클러스터링, 계통분류, 분자 구조 예측을 위한 생물정보학 소프트웨어의 개발 및 확장을 목표로 하고 있습니다.
pi.bio2: |-
  Milot은 뮌헨 LMU/TUM에서 생물정보학으로 학사 학위를, 뮌헨 LMU에서 석사 학위를 취득하였으며, 막스 플랑크 연구소에서 박사 학위를 취득하였습니다. 박사 학위 취득 후에는 <a href="https://steineggerlab.com">Martin Steinegger 교수</a>, <a href="https://www.mpinat.mpg.de/soeding">Johannes Söding 박사와</a> 함께 생물학적 서열 정렬 및 탐색, 기능 분석 소프트웨어를 개발하였습니다.
team.heading: 구성원
team.copy: |-
  연구 인턴, 대학원생, 박사후연구원, 소프트웨어 엔지니어 등 다양한 인재를 모집 중에 있습니다. 빅데이터 처리, HPC/GPU 프로그래밍, 머신러닝, open-source 과학 소프트웨어 등에 관심 있는 분들께 저희 연구실의 문은 항상 열려 있습니다. 간략한 자기소개 및 CV를 <a href="mailto:milot@mirdita.org" target="_blank">milot@mirdita.org로</a> 보내주세요.
